<!-- SPAs(single page application) sao aplicacoes web que carregam uma unica pagina html e atualizam o conteudo dinamicamente conforme o usuario interage com a aplicacao, sem precisar recarregar a pagina inteira. Isso é gerado pelo javaScript
  Pontos positivos:
  - Experiencia de usuario fluida e rapida, pois nao precisa recarregar a pagina inteira
  - Permite criar interfaces mais interativas e responsivas
  - Facilita o desenvolvimento de aplicacoes web modernas, como redes sociais, plataformas de streaming e aplicativos de produtividade
  Pontos negativos:
  - Seo = Nao use para sites que precisam de indexacao em motores de busca, como blogs ou sites de noticias e ecommerces e quem soluciona isso é o Next.js 

  Componentes sao que nem funcoes javaScript so que reutilizaveis e no react dividimos a aplicacao em pequenos componentes e usamos jsx para escrevelos que seria uma mistura de JavaScript e html e como se fosse um html especial para o react e dentro dele podemos usar expressoes javascript
  -->
